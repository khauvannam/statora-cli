version: 2

project_name: statora

before:
  hooks:
    - go mod tidy

builds:
  - id: statora
    binary: statora
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

universal_binaries:
  - id: statora-universal
    ids:
      - statora
    replace: true
    name_template: statora

archives:
  - id: statora
    builds:
      - statora
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format: tar.gz
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: khauvannam
    name: statora-cli
  prerelease: auto
  draft: false
  name_template: "v{{.Version}}"

brews:
  - name: statora
    repository:
      owner: khauvannam
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/khauvannam/statora-cli"
    description: "PHP version manager — manages PHP, Composer, and extensions per project."
    license: "MIT"
    caveats: |
      To use statora as a transparent php/composer shim, add symlinks:
        ln -sf $(brew --prefix)/bin/statora $(brew --prefix)/bin/php
        ln -sf $(brew --prefix)/bin/statora $(brew --prefix)/bin/composer
    install: |
      bin.install "statora"
    test: |
      system "#{bin}/statora", "--help"
